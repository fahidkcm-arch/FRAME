<script>
        const frameInput = document.getElementById('frame-upload');
        const bgInput = document.getElementById('bg-upload');
        const fitModeSelect = document.getElementById('fit-mode');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btnDownload = document.getElementById('btn-download');
        const btnDownloadAll = document.getElementById('btn-download-all');
        const placeholder = document.getElementById('preview-placeholder');
        const fileCountTxt = document.getElementById('file-count');
        const statusMsg = document.getElementById('status-message');

        let frameImg = new Image();
        let bgFiles = [];       // Array to hold multiple user images
        let currentBgImg = null; // The currently previewed image

        // Initialize default frame
        frameImg.src = './frame.png'; 
        frameImg.onload = () => {
            canvas.width = frameImg.width;
            canvas.height = frameImg.height;
            drawCanvas();
        };

        // 1. Handle Custom Frame Upload
        frameInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                let newFrame = new Image();
                newFrame.onload = () => {
                    frameImg = newFrame;
                    canvas.width = frameImg.width;
                    canvas.height = frameImg.height;
                    drawCanvas();
                };
                newFrame.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // 2. Handle Background Image(s) Upload
        bgInput.addEventListener('change', (e) => {
            bgFiles = Array.from(e.target.files);
            if (bgFiles.length === 0) return;

            fileCountTxt.textContent = `${bgFiles.length} file(s) selected`;
            
            // Toggle Bulk Download Button
            if (bgFiles.length > 1) {
                btnDownloadAll.style.display = 'block';
            } else {
                btnDownloadAll.style.display = 'none';
            }

            // Load the first image for preview
            loadPreviewImage(bgFiles[0]);
        });

        // 3. Handle Fit Mode Changes
        fitModeSelect.addEventListener('change', drawCanvas);

        // Function to load an image object from a File
        function loadPreviewImage(file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                currentBgImg = new Image();
                currentBgImg.onload = () => {
                    btnDownload.disabled = false;
                    drawCanvas();
                };
                currentBgImg.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Core Drawing Engine
        function drawCanvas(bgImageToDraw = currentBgImg, targetCanvas = canvas) {
            if (!frameImg.width) return;
            placeholder.style.display = 'none';
            
            const context = targetCanvas.getContext('2d');
            const cw = targetCanvas.width;
            const ch = targetCanvas.height;
            const fitMode = fitModeSelect.value;

            // Clear canvas and fill with a white background for JPEG compatibility
            context.clearRect(0, 0, cw, ch);
            context.fillStyle = "#ffffff";
            context.fillRect(0, 0, cw, ch);
            
            // Draw background if exists
            if (bgImageToDraw) {
                const iw = bgImageToDraw.width;
                const ih = bgImageToDraw.height;
                let x = 0, y = 0, drawWidth = cw, drawHeight = ch;

                if (fitMode === 'cover') {
                    const scale = Math.max(cw / iw, ch / ih);
                    drawWidth = iw * scale;
                    drawHeight = ih * scale;
                    x = (cw - drawWidth) / 2;
                    y = (ch - drawHeight) / 2;
                } else if (fitMode === 'contain') {
                    const scale = Math.min(cw / iw, ch / ih);
                    drawWidth = iw * scale;
                    drawHeight = ih * scale;
                    x = (cw - drawWidth) / 2;
                    y = (ch - drawHeight) / 2;
                }
                // If stretch, x=0, y=0, drawWidth=cw, drawHeight=ch (default values)

                context.drawImage(bgImageToDraw, x, y, drawWidth, drawHeight);
            }

            // Draw frame on top
            context.drawImage(frameImg, 0, 0, cw, ch);
        }

        // Download Single (Now JPEG at 90% quality)
        btnDownload.addEventListener('click', () => {
            const dataUrl = canvas.toDataURL('image/jpeg', 0.90); 
            const link = document.createElement('a');
            link.download = `framed-${bgFiles[0]?.name.split('.')[0] || 'photo'}.jpg`;
            link.href = dataUrl;
            link.click();
        });

        // Download All (Bulk Zip Generation - Now JPEG at 90% quality)
        btnDownloadAll.addEventListener('click', async () => {
            statusMsg.textContent = "Processing images... please wait.";
            btnDownloadAll.disabled = true;
            btnDownload.disabled = true;

            const zip = new JSZip();
            const imgFolder = zip.folder("Framed_Photos");
            
            // Offscreen canvas for background processing
            const offScreenCanvas = document.createElement('canvas');
            offScreenCanvas.width = frameImg.width;
            offScreenCanvas.height = frameImg.height;

            for (let i = 0; i < bgFiles.length; i++) {
                statusMsg.textContent = `Processing image ${i + 1} of ${bgFiles.length}...`;
                
                // Convert file to Image object
                const img = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const tempImg = new Image();
                        tempImg.onload = () => resolve(tempImg);
                        tempImg.src = e.target.result;
                    };
                    reader.readAsDataURL(bgFiles[i]);
                });

                // Draw to offscreen canvas
                drawCanvas(img, offScreenCanvas);

                // Convert canvas to Blob (JPEG format)
                const blob = await new Promise(resolve => offScreenCanvas.toBlob(resolve, 'image/jpeg', 0.90));
                
                // Add to zip
                const originalName = bgFiles[i].name.split('.')[0];
                imgFolder.file(`framed_${originalName}.jpg`, blob);
            }

            statusMsg.textContent = "Zipping files... almost done!";
            
            // Generate Zip and trigger download
            zip.generateAsync({ type: "blob" }).then(function(content) {
                saveAs(content, "Summer_Conclave_Photos.zip");
                statusMsg.textContent = "Download complete!";
                btnDownloadAll.disabled = false;
                btnDownload.disabled = false;
                
                setTimeout(() => { statusMsg.textContent = ""; }, 4000);
            });
        });
    </script>
